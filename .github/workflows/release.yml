name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1)'
        required: true
        type: string

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG" ] || [ "$TAG" = "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "Tag: $TAG"
          MANIFEST_VER=$(grep -E '^version' fs25_halle_generator/blender_manifest.toml | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "Manifest version: $MANIFEST_VER"
          if [ "v$MANIFEST_VER" != "$TAG" ]; then
            echo "::warning::Tag $TAG does not match manifest version v$MANIFEST_VER"
          fi

      - name: Build zip
        run: python make_zip.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: fs25_halle_generator-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
