name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test (Blender ${{ matrix.blender-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        blender-version: ["4.2.5", "4.3.2"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Blender system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxi6 libxxf86vm1 libxfixes3 libxrender1 libgl1 libxkbcommon0 \
            libsm6 libice6 libxext6

      - name: Cache Blender ${{ matrix.blender-version }}
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ matrix.blender-version }}-linux-x64-v1

      - name: Download Blender ${{ matrix.blender-version }}
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ matrix.blender-version }}"
          SHORT="${VERSION%.*}"
          URL="https://download.blender.org/release/Blender${SHORT}/blender-${VERSION}-linux-x64.tar.xz"
          echo "Downloading: $URL"
          mkdir -p ~/blender
          curl -sSL "$URL" | tar -xJ -C ~/blender --strip-components=1

      - name: Verify Blender starts
        run: ~/blender/blender --version

      - name: Run smoke tests
        run: |
          ~/blender/blender --background --python test_addon.py 2>&1 | tee test_output.log
          grep -q "RESULT: ALL PASS" test_output.log

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-blender-${{ matrix.blender-version }}
          path: |
            test_output.log
            test_output.blend
          if-no-files-found: ignore
          retention-days: 14

  build-zip:
    name: Build installable zip
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build zip
        run: python make_zip.py

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: fs25_halle_generator-zip
          path: fs25_halle_generator-*.zip
          retention-days: 30
